<div class="complete-container">

  <div class="complete-card">

    <div class="trophy">
      ✓
    </div>

    <h1 class="title">
      Workout Complete
    </h1>

    <p class="subtitle">
      Great work today. Your effort is paying off.
    </p>

    <div class="stats">

      <div class="stat">
        <span class="value">{{totalSets}}</span>
        <span class="label">Sets</span>
      </div>

      <div class="stat">
        <span class="value">{{totalWeight}}</span>
        <span class="label">kg lifted</span>
      </div>

      <div class="stat">
        <span class="value">{{duration}}</span>
        <span class="label">minutes</span>
      </div>

    </div>

    <button
      class="home-button"
      (click)="goHome()"
    >
      Back to Home
    </button>

  </div>

</div>
